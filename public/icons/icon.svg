<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22c55e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16a34a;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bgGrad)"/>
  <!-- Leaf/Plant icon -->
  <g transform="translate(256, 256)">
    <!-- Main leaf -->
    <path d="M-80,-120 Q0,-180 80,-120 Q120,-40 80,40 Q0,120 -80,40 Q-120,-40 -80,-120"
          fill="#fff" opacity="0.95"/>
    <!-- Leaf vein -->
    <path d="M0,-100 Q0,0 0,80"
          stroke="#16a34a" stroke-width="8" fill="none" stroke-linecap="round"/>
    <path d="M0,-60 Q-30,-40 -50,-20"
          stroke="#16a34a" stroke-width="6" fill="none" stroke-linecap="round"/>
    <path d="M0,-20 Q30,0 50,20"
          stroke="#16a34a" stroke-width="6" fill="none" stroke-linecap="round"/>
    <!-- Recycling arrows around -->
    <g fill="none" stroke="#fff" stroke-width="12" stroke-linecap="round" opacity="0.6">
      <path d="M-100,80 A120,120 0 0,1 -100,-80" />
      <path d="M100,-80 A120,120 0 0,1 100,80" />
    </g>
    <!-- Arrow heads -->
    <polygon points="-115,-80 -85,-80 -100,-60" fill="#fff" opacity="0.6"/>
    <polygon points="115,80 85,80 100,60" fill="#fff" opacity="0.6"/>
  </g>
</svg>
